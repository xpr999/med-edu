<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥物衛教系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap');
:root{
  --teal:#0d7e7e;--teal-lt:#e8f7f7;--teal-md:#b2dede;
  --ink:#1a2630;--muted:#6b8898;--border:#dde8ec;
  --warn:#e65100;--green:#2e7d32;--paper:#f5fafa;
  --purple:#6a1b9a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

.header{background:linear-gradient(135deg,#0a6666 0%,var(--teal) 100%);padding:16px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.header h1{font-size:1.15rem;font-weight:700;color:#fff}
.header p{font-size:.75rem;color:rgba(255,255,255,.75);margin-top:2px}

/* NAV TABS */
.nav-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border)}
.nav-tab{flex:1;padding:12px;text-align:center;font-size:.88rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;color:var(--muted)}
.nav-tab:hover{background:var(--teal-lt)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* KEY BAR */
.key-bar{background:#fff8e1;border-bottom:1px solid #ffe082;padding:10px 28px;display:flex;align-items:center;gap:10px;font-size:.82rem}
.key-bar input{flex:1;border:1px solid #ffe082;border-radius:6px;padding:6px 10px;font-size:.82rem;font-family:inherit}
.key-bar button{background:var(--teal);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:600}
.key-bar button:hover{background:#0a6060}
.key-bar.saved{background:#e8f5e9;border-color:#a5d6a7}
.key-bar.saved::before{content:'Key 已儲存';color:var(--green);font-weight:600;margin-right:8px}

/* PAGE CONTAINERS */
.page{display:none}
.page.active{display:block}

/* ===== EDU PAGE ===== */
.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 160px)}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:22px 18px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.label-sm{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

.upload-area{border:2px dashed var(--teal-md);border-radius:12px;background:var(--teal-lt);padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-area:hover{border-color:var(--teal);background:#d4f0f0}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.upload-area .upload-icon{font-size:2.4rem;margin-bottom:8px;line-height:1}
.upload-area .upload-text{font-size:.82rem;color:var(--muted);line-height:1.6}
.upload-area .upload-text strong{color:var(--teal);display:block;font-size:.9rem}
#preview{width:100%;max-height:200px;object-fit:contain;border-radius:9px;border:1px solid var(--border);background:#f0f5f5;display:none;margin-top:10px}

.extra-input{width:100%;background:#f5f7f8;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.82rem;font-family:inherit;color:var(--ink);resize:vertical;min-height:68px;line-height:1.6;transition:border-color .2s}
.extra-input:focus{outline:none;border-color:var(--teal)}

.btn-analyse{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;box-shadow:0 2px 8px rgba(13,126,126,.3)}
.btn-analyse:hover:not(:disabled){background:#0a6060;box-shadow:0 4px 14px rgba(13,126,126,.4);transform:translateY(-1px)}
.btn-analyse:disabled{background:#9fbec2;cursor:not-allowed;box-shadow:none;transform:none}
.btn-analyse .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-analyse.loading .spinner{display:block}
.btn-analyse.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

.chip-list{display:flex;flex-direction:column;gap:7px}
.chip{border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .2s;background:#fff;position:relative}
.chip:hover,.chip.active{border-color:var(--teal);background:var(--teal-lt)}
.chip .cname{font-weight:600;font-size:.86rem}
.chip .cmeta{font-size:.74rem;color:var(--muted);margin-top:3px}
.chip .cbadge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--teal);color:#fff;font-size:.64rem;border-radius:5px;padding:2px 7px;font-weight:700}

.main{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);text-align:center;padding:40px 0}
.empty-state .ei{font-size:4rem;opacity:.25}
.empty-state p{font-size:.88rem;line-height:1.7;max-width:280px}

.edu-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.edu-top h2{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--teal)}
.edu-top .date{font-size:.74rem;color:var(--muted)}
.btn-print{background:#fff;color:var(--teal);border:1.5px solid var(--teal);border-radius:8px;padding:8px 16px;font-size:.82rem;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.btn-print:hover{background:var(--teal-lt)}

.drug-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-head{background:linear-gradient(135deg,var(--teal) 0%,#0b9090 100%);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;gap:16px}
.pill-icon{width:68px;height:68px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;overflow:hidden}
.pill-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.card-head-info h3{font-size:1.08rem;font-weight:700}
.card-head-info .sub{font-size:.76rem;opacity:.8;margin-top:3px}
.badges{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.22);border-radius:5px;padding:2px 8px;font-size:.68rem;font-weight:600}

.card-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.info-tile{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:11px 13px}
.tile-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-size:.84rem;color:var(--ink);line-height:1.55;font-weight:500}

.sched-tile{background:var(--teal-lt);border:1px solid var(--teal-md);border-radius:10px;padding:13px 15px}
.sched-tile .tile-label{color:var(--teal)}
.sched-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.sched-pill{background:var(--teal);color:#fff;border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600}

.side-tile{background:#fff8f0;border:1px solid #ffd5a8;border-radius:10px;padding:13px 15px}
.side-tile .tile-label{color:#bf4000}
.side-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.side-tag{background:#ffe5c8;color:#7a2900;border-radius:5px;padding:3px 9px;font-size:.74rem;font-weight:500}

.warn-tile{background:#fff8e6;border-left:4px solid var(--warn);border-radius:0 10px 10px 0;padding:13px 15px}
.warn-tile .tile-label{color:var(--warn)}
.warn-tile ul{padding-left:18px}
.warn-tile ul li{font-size:.82rem;line-height:1.75;color:#5c3000}

.note-tile{background:#edf7ee;border:1px solid #aed9b0;border-radius:10px;padding:13px 15px}
.note-tile .tile-label{color:var(--green)}
.note-tile p{font-size:.83rem;color:#1a4d1e;line-height:1.75}

/* SUMMARY TABLE */
.summary-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.summary-title{background:linear-gradient(135deg,var(--teal),#0b9090);color:#fff;padding:12px 20px;font-size:.95rem;font-weight:700;font-family:'Noto Serif TC',serif}
.summary-list{display:flex;flex-direction:column}
.summary-row{display:flex;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:flex-start}
.summary-row:last-child{border-bottom:none}
.summary-row:hover{background:#f8fbfd}
.summary-drug{display:flex;align-items:center;gap:10px;min-width:180px;flex-shrink:0}
.summary-img{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.summary-pill{width:44px;height:44px;border-radius:8px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.summary-name{font-weight:700;font-size:.88rem;color:var(--ink)}
.summary-dose{font-weight:400;color:var(--teal);font-size:.78rem}
.summary-purpose{font-size:.78rem;color:var(--muted);margin-top:2px}
.summary-details{flex:1;display:flex;flex-direction:column;gap:3px}
.summary-warn{font-size:.78rem;color:#c0392b;font-weight:500;line-height:1.5}
.summary-sides{font-size:.74rem;color:var(--muted);line-height:1.5}
.summary-note{font-size:.76rem;color:var(--green);line-height:1.5;font-style:italic}

body.elder .summary-name{font-size:1.1rem}
body.elder .summary-purpose{font-size:.95rem}
body.elder .summary-warn{font-size:.95rem}
body.elder .summary-sides{font-size:.9rem}
body.elder .summary-note{font-size:.9rem}

.err-box{background:#fff0f0;border:1px solid #ffaaaa;border-radius:10px;padding:16px 18px;color:#9b0000;font-size:.85rem;line-height:1.6}
.err-box strong{display:block;font-size:.95rem;margin-bottom:4px}

/* SCHEDULE TIMELINE */
.sched-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sched-title{background:linear-gradient(135deg,#1a5276 0%,#2980b9 100%);color:#fff;padding:14px 20px;font-size:1rem;font-weight:700;font-family:'Noto Serif TC',serif}
.sched-timeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0}
.sched-slot{border-right:1px solid var(--border);padding:0}
.sched-slot:last-child{border-right:none}
.sched-slot-header{padding:12px 14px;text-align:center;border-bottom:1px solid var(--border)}
.sched-slot-icon{font-size:1.6rem;margin-bottom:4px}
.sched-slot-label{font-size:.88rem;font-weight:700}
.sched-slot-time{font-size:.7rem;opacity:.7;margin-top:2px}
.slot-morning .sched-slot-header{background:linear-gradient(135deg,#fef9e7,#fdebd0);color:#b7950b}
.slot-noon .sched-slot-header{background:linear-gradient(135deg,#fef5e7,#fae5d3);color:#ca6f1e}
.slot-evening .sched-slot-header{background:linear-gradient(135deg,#f4ecf7,#ebdef0);color:#7d3c98}
.slot-bedtime .sched-slot-header{background:linear-gradient(135deg,#eaf2f8,#d4e6f1);color:#1a5276}
.sched-slot-drugs{padding:12px 10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.sched-drug{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:8px 10px;transition:all .2s}
.sched-drug:hover{box-shadow:0 2px 6px rgba(0,0,0,.06)}
.sched-drug-img{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.sched-drug-pill{width:42px;height:42px;border-radius:6px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.sched-drug-info{flex:1;min-width:0}
.sched-drug-name{font-size:.8rem;font-weight:600;color:var(--ink);line-height:1.3}
.sched-drug-dose{font-size:.7rem;color:var(--muted);margin-top:1px}

/* PRN SECTION */
.prn-section{border-top:1px solid var(--border);padding:16px 20px}
.prn-title{font-size:.82rem;font-weight:700;color:var(--warn);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.prn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.prn-card{display:flex;align-items:center;gap:10px;background:#fff8f0;border:1px solid #ffd5a8;border-radius:10px;padding:10px 14px}
.prn-card-img{width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid #ffd5a8;flex-shrink:0}
.prn-card-pill{width:44px;height:44px;border-radius:6px;background:#ffe5c8;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.prn-card-info{flex:1}
.prn-card-name{font-size:.82rem;font-weight:700;color:#7a2900}
.prn-card-dose{font-size:.7rem;color:var(--muted);margin-top:1px}
.prn-card-trigger{font-size:.74rem;color:#bf4000;margin-top:4px;font-style:italic}

.sched-note{padding:12px 20px;font-size:.76rem;color:var(--muted);border-top:1px solid var(--border);line-height:1.6}

/* INTERACTION WARNINGS */
.interact-wrap{background:#fff;border:2px solid #e74c3c;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(231,76,60,.15)}
.interact-title{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:12px 20px;font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.interact-list{padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.interact-item{background:#fef5f5;border:1px solid #f5c6cb;border-radius:10px;padding:12px 16px}
.interact-drugs{font-size:.85rem;font-weight:700;color:#c0392b;margin-bottom:4px}
.interact-desc{font-size:.8rem;color:#5a1a1a;line-height:1.6}
.interact-level{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px}
.interact-level.high{background:#e74c3c;color:#fff}
.interact-level.mid{background:#f39c12;color:#fff}
.interact-level.low{background:#f1c40f;color:#333}

/* MODE TOGGLES */
.mode-bar{display:flex;gap:8px;margin-bottom:4px}
.mode-toggle{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;color:var(--muted);transition:all .2s}
.mode-toggle:hover{border-color:var(--teal);color:var(--teal)}
.mode-toggle.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* ELDER MODE */
body.elder .drug-card .card-head-info h3{font-size:1.4rem}
body.elder .drug-card .tile-val{font-size:1.1rem;font-weight:600}
body.elder .drug-card .warn-tile ul li{font-size:1.05rem}
body.elder .drug-card .note-tile p{font-size:1.05rem}
body.elder .drug-card .sched-pill{font-size:1rem;padding:7px 18px}
body.elder .drug-card .side-tag{font-size:.9rem;padding:4px 12px}
body.elder .drug-card .tile-label{font-size:.8rem}
body.elder .drug-card .badge{font-size:.8rem;padding:3px 10px}
body.elder .sched-wrap .sched-slot-label{font-size:1.1rem}
body.elder .sched-wrap .sched-drug-name{font-size:1rem}
body.elder .sched-wrap .sched-drug-dose{font-size:.88rem}
body.elder .prn-card-name{font-size:1rem}
body.elder .interact-drugs{font-size:1.05rem}
body.elder .interact-desc{font-size:1rem}

/* SIMPLE MODE (fridge card) */
.simple-card{background:#fff;border:2px solid var(--teal);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);page-break-inside:avoid}
.simple-card-title{background:var(--teal);color:#fff;padding:14px 20px;font-size:1.1rem;font-weight:700;text-align:center;font-family:'Noto Serif TC',serif}
.simple-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0;border-top:1px solid var(--border)}
.simple-slot{border-right:1px solid var(--border);text-align:center}
.simple-slot:last-child{border-right:none}
.simple-slot-hd{padding:10px 8px;font-weight:700;font-size:1rem;border-bottom:1px solid var(--border)}
.slot-morning .simple-slot-hd{background:#fef9e7;color:#b7950b}
.slot-noon .simple-slot-hd{background:#fef5e7;color:#ca6f1e}
.slot-evening .simple-slot-hd{background:#f4ecf7;color:#7d3c98}
.slot-bedtime .simple-slot-hd{background:#eaf2f8;color:#1a5276}
.simple-slot-drugs{padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:10px}
.simple-pill{text-align:center}
.simple-pill img{width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.simple-pill-placeholder{width:56px;height:56px;border-radius:8px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto}
.simple-pill-name{font-size:.82rem;font-weight:600;margin-top:4px;color:var(--ink)}
.simple-pill-dose{font-size:.72rem;color:var(--muted)}
.simple-prn{border-top:2px solid #ffd5a8;padding:14px 20px;background:#fff8f0}
.simple-prn-title{font-weight:700;color:var(--warn);font-size:.9rem;margin-bottom:8px}
.simple-prn-items{display:flex;gap:16px;flex-wrap:wrap}
.simple-prn-item{display:flex;align-items:center;gap:8px}
.simple-prn-item img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.simple-note{text-align:center;padding:10px;font-size:.76rem;color:var(--muted);border-top:1px solid var(--border)}

body.elder .simple-pill-name{font-size:1rem}
body.elder .simple-pill-dose{font-size:.88rem}
body.elder .simple-slot-hd{font-size:1.2rem}

/* EDIT LIST */
.edit-item{background:#fff;border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px;position:relative}
.edit-item .edit-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.edit-item input,.edit-item select{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:.78rem;font-family:inherit;width:100%;color:var(--ink);background:#fff}
.edit-item input:focus,.edit-item select:focus{outline:none;border-color:var(--teal)}
.edit-item .edit-label{font-size:.62rem;color:var(--muted);font-weight:600;margin-bottom:2px}
.edit-item .edit-del{position:absolute;top:6px;right:6px;background:none;border:none;color:#ccc;cursor:pointer;font-size:.9rem;padding:2px 5px}
.edit-item .edit-del:hover{color:var(--warn)}
.edit-add{width:100%;padding:8px;border:2px dashed var(--border);border-radius:9px;background:none;cursor:pointer;font-size:.82rem;color:var(--muted);font-family:inherit;margin-top:4px;transition:all .2s}
.edit-add:hover{border-color:var(--teal);color:var(--teal)}

.upload-area.drag{border-color:var(--teal);background:#c8ecec}

/* ===== DRUG MANAGEMENT PAGE ===== */
.mgmt-container{max-width:1100px;margin:0 auto;padding:24px}
.mgmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.mgmt-header h2{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--teal)}
.mgmt-stats{font-size:.82rem;color:var(--muted)}

.cat-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.cat-tab{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .2s}
.cat-tab:hover{border-color:var(--teal);color:var(--teal)}
.cat-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.cat-tab .cat-count{background:rgba(0,0,0,.1);border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:4px}
.cat-tab.active .cat-count{background:rgba(255,255,255,.3)}

.drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

.drug-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;position:relative}
.drug-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.drug-item.has-photo{border-color:var(--teal-md)}
.drug-item .di-photo{width:100%;height:120px;background:#f5f7f8;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;cursor:pointer;position:relative;border:2px dashed var(--border)}

function getCustomDrugs() {
  try { return JSON.parse(localStorage.getItem('custom_drugs') || '[]'); }
  catch { return []; }
}
function saveCustomDrugs(list) {
  localStorage.setItem('custom_drugs', JSON.stringify(list));
}
function getAllDrugs() {
  return [...DRUG_DB, ...getCustomDrugs()];
}
function getCategories() {
  return [...new Set(getAllDrugs().map(d=>d.cat))];
}

// IndexedDB 管理藥物照片
// ══════════════════════════════════════════════════════════════════
const DB_NAME = 'MedEduPhotos';
const DB_VER = 1;
let idb = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (idb) return resolve(idb);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore('photos', {keyPath:'code'});
    };
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror = e => reject(e.target.error);
  });
}

  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').put({code, dataURL});
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getPhoto(code) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').get(code);
    req.onsuccess = () => resolve(req.result?.dataURL || null);
    req.onerror = e => reject(e.target.error);
  });
}

async function deletePhoto(code) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').delete(code);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getAllPhotos() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').getAll();
    req.onsuccess = () => {
      const map = {};
      (req.result||[]).forEach(r => map[r.code] = r.dataURL);
      resolve(map);
    };
    req.onerror = e => reject(e.target.error);
  });
}

async function uploadDrugPhoto(code, input) {
  const file = input.files[0];
  if (!file?.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    // resize to max 300px for storage efficiency
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const max = 300;
      let w = img.width, h = img.height;
      if (w > h) { h = h * max / w; w = max; }
      else { w = w * max / h; h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataURL = canvas.toDataURL('image/jpeg', 0.85);
      await savePhoto(code, dataURL);
      renderMgmt();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

  e.preventDefault();
  await deletePhoto(code);

}

async function callClaude(messages) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 4096,
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || data.error);
  const text = data.content?.[0]?.text || '{}';
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  return jsonMatch ? jsonMatch[0] : '{}';
}

// 藥物比對：AI 辨識結果 → 本地資料庫
// ══════════════════════════════════════════════════════════════════
function matchDrug(d) {
  const searchTerms = [
    d.brand_name, d.chinese_name, d.generic_name, d.code
  ].filter(Boolean).map(s => s.toLowerCase().trim());

  let best = null, bestScore = 0;
  for (const db of getAllDrugs()) {
    const targets = [db.alias, db.code, db.eng, db.chn, db.generic]
      .map(s => s.toLowerCase());
    let score = 0;
    for (const term of searchTerms) {
      for (const tgt of targets) {
        if (tgt === term) score += 10;
        else if (tgt.includes(term) || term.includes(tgt)) score += 5;
      }
    }
    if (score > bestScore) { bestScore = score; best = db; }
  }
  return bestScore >= 5 ? best : null;
}

// ══════════════════════════════════════════════════════════════════
// 服藥時間表
// ══════════════════════════════════════════════════════════════════
const TIME_SLOTS = [
  {key:'morning', label:'早上',  time:'07:00 – 08:00', icon:'🌅', cls:'slot-morning',
   keywords:['早','morning','早餐','起床','07','08','am']},
  {key:'noon',    label:'中午',  time:'12:00 – 13:00', icon:'☀️', cls:'slot-noon',
   keywords:['中午','午','noon','lunch','12','13']},
  {key:'evening', label:'晚上',  time:'18:00 – 19:00', icon:'🌇', cls:'slot-evening',
   keywords:['晚','evening','dinner','晚餐','18','19']},
  {key:'bedtime', label:'睡前',  time:'21:00 – 22:00', icon:'🌙', cls:'slot-bedtime',
   keywords:['睡前','bedtime','hs','22','21','night']}
];
const PRN_KEYWORDS = ['需要時','prn','必要','痛','不適','as needed'];

function classifyTiming(drug, eduItem) {
  const slots = new Set();
  const texts = [
    drug.frequency, drug.timing,
    ...(eduItem?.schedule_times || [])
  ].filter(Boolean).map(s => s.toLowerCase());
  const allText = texts.join(' ');

  // check PRN first
  if (PRN_KEYWORDS.some(k => allText.includes(k))) return { slots: new Set(), isPRN: true };

  for (const slot of TIME_SLOTS) {
    for (const kw of slot.keywords) {
      if (allText.includes(kw)) { slots.add(slot.key); break; }
    }
  }

  // frequency-based
  if (/\bhs\b/.test(allText)) slots.add('bedtime');
  if (/\bbid\b|每日兩次|早晚/.test(allText)) { slots.add('morning'); slots.add('bedtime'); }
  else if (/\btid\b|每日三次/.test(allText)) { slots.add('morning'); slots.add('noon'); slots.add('evening'); }
  else if (/\bqid\b|每日四次/.test(allText)) { slots.add('morning'); slots.add('noon'); slots.add('evening'); slots.add('bedtime'); }
  else if (/\bqd\b|每日一次/.test(allText) && slots.size === 0) { slots.add('morning'); }
  if (slots.size === 0) { slots.add('morning'); }

  return { slots, isPRN: false };
}

function renderScheduleTable(drugs, edu, photos) {
  const scheduled = []; // {name, dose, photo, slots}
  const prnDrugs = [];  // {name, dose, photo, purpose}

  drugs.forEach((d, i) => {
    const e = edu.find(x => x.index === i) || {};
    const db = matchDrug(d);
    const photo = db ? photos[db.code] : null;
    const name = db?.alias || d.brand_name || d.chinese_name || d.generic_name;
    const dose = d.dose || '';
    const { slots, isPRN } = classifyTiming(d, e);

    if (isPRN) {
      prnDrugs.push({ name, dose, photo, purpose: e.purpose || '需要時使用' });
    } else {
      scheduled.push({ name, dose, photo, slots });
    }
  });

  // find which time slots are actually used
  const activeSlots = TIME_SLOTS.filter(s =>
    scheduled.some(r => r.slots.has(s.key))
  );

  let html = `<div class="sched-wrap">
    <div class="sched-title">每日服藥時間表</div>
    <div class="sched-timeline">`;

  activeSlots.forEach(slot => {
    const slotDrugs = scheduled.filter(r => r.slots.has(slot.key));
    html += `<div class="sched-slot ${slot.cls}">
      <div class="sched-slot-header">
        <div class="sched-slot-icon">${slot.icon}</div>
        <div class="sched-slot-label">${slot.label}</div>
        <div class="sched-slot-time">${slot.time}</div>
      </div>
      <div class="sched-slot-drugs">`;

    slotDrugs.forEach(d => {
      html += `<div class="sched-drug">
        ${d.photo
          ? `<img class="sched-drug-img" src="${d.photo}" alt="${d.name}">`
          : `<div class="sched-drug-pill">💊</div>`}
        <div class="sched-drug-info">
          <div class="sched-drug-name">${d.name}</div>
          <div class="sched-drug-dose">${d.dose}</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  // PRN section
  if (prnDrugs.length) {
    html += `<div class="prn-section">
      <div class="prn-title">⚡ 需要時使用（不需每日固定服用）</div>
      <div class="prn-grid">`;
    prnDrugs.forEach(d => {
      html += `<div class="prn-card">
        ${d.photo
          ? `<img class="prn-card-img" src="${d.photo}" alt="${d.name}">`
          : `<div class="prn-card-pill">💊</div>`}
        <div class="prn-card-info">
          <div class="prn-card-name">${d.name} ${d.dose}</div>
          <div class="prn-card-trigger">${d.purpose}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="sched-note">* 實際服藥時間請依醫師指示為準</div></div>`;
  return html;
}

        <div class="interact-title">⚠ 藥物交互作用提醒</div>
        <div class="interact-list">
          ${interactions.map(x => `<div class="interact-item">
            <div class="interact-drugs">
              <span class="interact-level ${x.level}">${levelLabel[x.level]||'注意'}</span>
              ${x.drug_a} ✕ ${x.drug_b}
            </div>
            <div class="interact-desc">${x.description}</div>
          </div>`).join('')}
        </div>
      </div>`);
  }

  // 服藥時間表
  panel.insertAdjacentHTML('beforeend', renderScheduleTable(drugs, edu, photos));

  // 簡單模式：只印時間表 + 交互作用 + 精簡摘要
  // 一般模式：加上每藥一行的精簡摘要表
  panel.insertAdjacentHTML('beforeend', renderSummaryTable(drugs, edu, photos));
}

// ── 精簡摘要表（取代冗長的個別卡片）──────────────────────────────
function renderSummaryTable(drugs, edu, photos) {
  let html = `<div class="summary-wrap">
    <div class="summary-title">藥物重點說明</div>
    <div class="summary-list">`;

  drugs.forEach((d, i) => {
    const e = edu.find(x => x.index === i) || {};
    const db = matchDrug(d);
    const photo = db ? photos[db.code] : null;
    const name = db?.alias || d.brand_name || d.chinese_name || '';
    const topWarn = (e.warnings || []).slice(0, 2).join('；');
    const sides = (e.side_effects || []).slice(0, 3).join('、');

    html += `<div class="summary-row">
      <div class="summary-drug">
        ${photo
          ? `<img class="summary-img" src="${photo}" alt="${name}">`
          : `<div class="summary-pill">💊</div>`}
        <div class="summary-drug-info">
          <div class="summary-name">${name} <span class="summary-dose">${d.dose||''}</span></div>
          <div class="summary-purpose">${e.purpose || '依醫師說明'}</div>
        </div>
      </div>
      <div class="summary-details">
        ${topWarn ? `<div class="summary-warn">⚠ ${topWarn}</div>` : ''}
        ${sides && !simpleMode ? `<div class="summary-sides">可能副作用：${sides}</div>` : ''}
        ${e.patient_note && !simpleMode ? `<div class="summary-note">${e.patient_note}</div>` : ''}
      </div>
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

// 長輩模式 / 簡單模式
// ══════════════════════════════════════════════════════════════════
let elderMode = false, simpleMode = false;

function toggleElder() {
  elderMode = !elderMode;
  document.body.classList.toggle('elder', elderMode);
  document.getElementById('btnElder').classList.toggle('active', elderMode);
}

function toggleSimple() {
  simpleMode = !simpleMode;
  document.getElementById('btnSimple').classList.toggle('active', simpleMode);
}

function renderSimpleCard(drugs, edu, photos) {
  const scheduled = [];
  const prnDrugs = [];

  drugs.forEach((d, i) => {
    const e = edu.find(x => x.index === i) || {};
    const db = matchDrug(d);
    const photo = db ? photos[db.code] : null;
    const name = db?.alias || d.brand_name || d.chinese_name || d.generic_name;
    const dose = d.dose || '';
    const { slots, isPRN } = classifyTiming(d, e);
    if (isPRN) prnDrugs.push({ name, dose, photo });
    else scheduled.push({ name, dose, photo, slots });
  });

  const activeSlots = TIME_SLOTS.filter(s => scheduled.some(r => r.slots.has(s.key)));

  let html = `<div class="simple-card">
    <div class="simple-card-title">我的服藥小卡</div>
    <div class="simple-grid">`;

  activeSlots.forEach(slot => {
    const slotDrugs = scheduled.filter(r => r.slots.has(slot.key));
    html += `<div class="simple-slot ${slot.cls}">
      <div class="simple-slot-hd">${slot.icon} ${slot.label}</div>
      <div class="simple-slot-drugs">`;
    slotDrugs.forEach(d => {
      html += `<div class="simple-pill">
        ${d.photo ? `<img src="${d.photo}" alt="${d.name}">` : `<div class="simple-pill-placeholder">💊</div>`}
        <div class="simple-pill-name">${d.name}</div>
        <div class="simple-pill-dose">${d.dose}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;

  if (prnDrugs.length) {
    html += `<div class="simple-prn">
      <div class="simple-prn-title">⚡ 需要時才吃</div>
      <div class="simple-prn-items">`;
    prnDrugs.forEach(d => {
      html += `<div class="simple-prn-item">
        ${d.photo ? `<img src="${d.photo}" alt="${d.name}">` : '💊'}
        <span style="font-weight:600;font-size:.85rem">${d.name} ${d.dose}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="simple-note">剪下來貼在冰箱上，每天對照服藥</div></div>`;
  return html;
}

// 新增 / 編輯 / 刪除藥物
// ══════════════════════════════════════════════════════════════════
function openAddDrug() {
  document.getElementById('modalTitle').textContent = '新增藥物';
  document.getElementById('editCode').value = '';
  document.getElementById('fAlias').value = '';
  document.getElementById('fCode').value = '';
  document.getElementById('fEng').value = '';
  document.getElementById('fChn').value = '';
  document.getElementById('fGeneric').value = '';
  document.getElementById('fCat').value = '精神科用藥';
  document.getElementById('drugModal').classList.add('show');
}

function openEditDrug(code) {
  const drug = getCustomDrugs().find(d => d.code === code);
  if (!drug) return;
  document.getElementById('modalTitle').textContent = '編輯藥物';
  document.getElementById('editCode').value = code;
  document.getElementById('fAlias').value = drug.alias;
  document.getElementById('fCode').value = drug.code;
  document.getElementById('fEng').value = drug.eng;
  document.getElementById('fChn').value = drug.chn;
  document.getElementById('fGeneric').value = drug.generic;
  document.getElementById('fCat').value = drug.cat;
  document.getElementById('drugModal').classList.add('show');
}

function closeModal() {
  document.getElementById('drugModal').classList.remove('show');
}

function saveDrug() {
  const alias = document.getElementById('fAlias').value.trim();
  const code = document.getElementById('fCode').value.trim();
  if (!alias || !code) { alert('慣用名和代碼為必填'); return; }

  const drug = {
    cat: document.getElementById('fCat').value,
    alias,
    code,
    eng: document.getElementById('fEng').value.trim() || alias,
    chn: document.getElementById('fChn').value.trim() || alias,
    generic: document.getElementById('fGeneric').value.trim() || ''
  };

  const editCode = document.getElementById('editCode').value;
  const customs = getCustomDrugs();

  // check duplicate code
  const allExisting = [...DRUG_DB, ...customs];
  const dup = allExisting.find(d => d.code === code && d.code !== editCode);
  if (dup) { alert(`代碼 "${code}" 已存在（${dup.alias}）`); return; }

  if (editCode) {
    // editing
    const idx = customs.findIndex(d => d.code === editCode);
    if (idx >= 0) customs[idx] = drug;
  } else {
    // adding
    customs.push(drug);
  }

  saveCustomDrugs(customs);
  closeModal();
  renderMgmt();
}

async function deleteDrug(code) {
  if (!confirm('確定要刪除這個藥物嗎？')) return;
  const customs = getCustomDrugs().filter(d => d.code !== code);
  saveCustomDrugs(customs);
  await deletePhoto(code);
  renderMgmt();
}

// close modal on overlay click
document.getElementById('drugModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function showError(title, msg) {
  document.getElementById('mainPanel').insertAdjacentHTML('beforeend',
    `<div class="err-box"><strong>${title}</strong>${msg}</div>`);
}

openDB();
