<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥物衛教系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap');
:root{
  --teal:#0d7e7e;--teal-lt:#e8f7f7;--teal-md:#b2dede;
  --ink:#1a2630;--muted:#6b8898;--border:#dde8ec;
  --warn:#e65100;--green:#2e7d32;--paper:#f5fafa;
  --purple:#6a1b9a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

.header{background:linear-gradient(135deg,#0a6666 0%,var(--teal) 100%);padding:16px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.header h1{font-size:1.15rem;font-weight:700;color:#fff}
.header p{font-size:.75rem;color:rgba(255,255,255,.75);margin-top:2px}

/* NAV TABS */
.nav-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border)}
.nav-tab{flex:1;padding:12px;text-align:center;font-size:.88rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;color:var(--muted)}
.nav-tab:hover{background:var(--teal-lt)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* KEY BAR */
.key-bar{background:#fff8e1;border-bottom:1px solid #ffe082;padding:10px 28px;display:flex;align-items:center;gap:10px;font-size:.82rem}
.key-bar input{flex:1;border:1px solid #ffe082;border-radius:6px;padding:6px 10px;font-size:.82rem;font-family:inherit}
.key-bar button{background:var(--teal);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:600}
.key-bar button:hover{background:#0a6060}
.key-bar.saved{background:#e8f5e9;border-color:#a5d6a7}
.key-bar.saved::before{content:'Key 已儲存';color:var(--green);font-weight:600;margin-right:8px}

/* PAGE CONTAINERS */
.page{display:none}
.page.active{display:block}

/* ===== EDU PAGE ===== */
.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 160px)}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:22px 18px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.label-sm{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

.upload-area{border:2px dashed var(--teal-md);border-radius:12px;background:var(--teal-lt);padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-area:hover{border-color:var(--teal);background:#d4f0f0}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.upload-area .upload-icon{font-size:2.4rem;margin-bottom:8px;line-height:1}
.upload-area .upload-text{font-size:.82rem;color:var(--muted);line-height:1.6}
.upload-area .upload-text strong{color:var(--teal);display:block;font-size:.9rem}
#preview{width:100%;max-height:200px;object-fit:contain;border-radius:9px;border:1px solid var(--border);background:#f0f5f5;display:none;margin-top:10px}

.extra-input{width:100%;background:#f5f7f8;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.82rem;font-family:inherit;color:var(--ink);resize:vertical;min-height:68px;line-height:1.6;transition:border-color .2s}
.extra-input:focus{outline:none;border-color:var(--teal)}

.btn-analyse{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;box-shadow:0 2px 8px rgba(13,126,126,.3)}
.btn-analyse:hover:not(:disabled){background:#0a6060;box-shadow:0 4px 14px rgba(13,126,126,.4);transform:translateY(-1px)}
.btn-analyse:disabled{background:#9fbec2;cursor:not-allowed;box-shadow:none;transform:none}
.btn-analyse .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-analyse.loading .spinner{display:block}
.btn-analyse.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

.chip-list{display:flex;flex-direction:column;gap:7px}
.chip{border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .2s;background:#fff;position:relative}
.chip:hover,.chip.active{border-color:var(--teal);background:var(--teal-lt)}
.chip .cname{font-weight:600;font-size:.86rem}
.chip .cmeta{font-size:.74rem;color:var(--muted);margin-top:3px}
.chip .cbadge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--teal);color:#fff;font-size:.64rem;border-radius:5px;padding:2px 7px;font-weight:700}

.main{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);text-align:center;padding:40px 0}
.empty-state .ei{font-size:4rem;opacity:.25}
.empty-state p{font-size:.88rem;line-height:1.7;max-width:280px}

.edu-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.edu-top h2{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--teal)}
.edu-top .date{font-size:.74rem;color:var(--muted)}
.btn-print{background:#fff;color:var(--teal);border:1.5px solid var(--teal);border-radius:8px;padding:8px 16px;font-size:.82rem;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.btn-print:hover{background:var(--teal-lt)}

.drug-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-head{background:linear-gradient(135deg,var(--teal) 0%,#0b9090 100%);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;gap:16px}
.pill-icon{width:68px;height:68px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;overflow:hidden}
.pill-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.card-head-info h3{font-size:1.08rem;font-weight:700}
.card-head-info .sub{font-size:.76rem;opacity:.8;margin-top:3px}
.badges{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.22);border-radius:5px;padding:2px 8px;font-size:.68rem;font-weight:600}

.card-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.info-tile{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:11px 13px}
.tile-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-size:.84rem;color:var(--ink);line-height:1.55;font-weight:500}

.sched-tile{background:var(--teal-lt);border:1px solid var(--teal-md);border-radius:10px;padding:13px 15px}
.sched-tile .tile-label{color:var(--teal)}
.sched-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.sched-pill{background:var(--teal);color:#fff;border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600}

.side-tile{background:#fff8f0;border:1px solid #ffd5a8;border-radius:10px;padding:13px 15px}
.side-tile .tile-label{color:#bf4000}
.side-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.side-tag{background:#ffe5c8;color:#7a2900;border-radius:5px;padding:3px 9px;font-size:.74rem;font-weight:500}

.warn-tile{background:#fff8e6;border-left:4px solid var(--warn);border-radius:0 10px 10px 0;padding:13px 15px}
.warn-tile .tile-label{color:var(--warn)}
.warn-tile ul{padding-left:18px}
.warn-tile ul li{font-size:.82rem;line-height:1.75;color:#5c3000}

.note-tile{background:#edf7ee;border:1px solid #aed9b0;border-radius:10px;padding:13px 15px}
.note-tile .tile-label{color:var(--green)}
.note-tile p{font-size:.83rem;color:#1a4d1e;line-height:1.75}

.err-box{background:#fff0f0;border:1px solid #ffaaaa;border-radius:10px;padding:16px 18px;color:#9b0000;font-size:.85rem;line-height:1.6}
.err-box strong{display:block;font-size:.95rem;margin-bottom:4px}

/* SCHEDULE TABLE */
.sched-table-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sched-table-title{background:linear-gradient(135deg,#1a5276 0%,#2980b9 100%);color:#fff;padding:14px 20px;font-size:1rem;font-weight:700;font-family:'Noto Serif TC',serif}
.sched-table{width:100%;border-collapse:collapse}
.sched-table th{background:#eaf2f8;color:#1a5276;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:10px 8px;border-bottom:2px solid #d4e6f1;text-align:center;white-space:nowrap}
.sched-table th.time-col{width:80px}
.sched-table td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.sched-table tr:hover{background:#f8fbfd}
.sched-drug-name{font-size:.76rem;font-weight:600;color:var(--ink);margin-top:4px;line-height:1.3}
.sched-drug-dose{font-size:.68rem;color:var(--muted)}
.sched-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.sched-cell-img{width:40px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.sched-cell-pill{width:40px;height:40px;border-radius:6px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.sched-empty{color:#ddd;font-size:1.2rem}
.sched-note{padding:12px 20px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);line-height:1.6}

.upload-area.drag{border-color:var(--teal);background:#c8ecec}

/* ===== DRUG MANAGEMENT PAGE ===== */
.mgmt-container{max-width:1100px;margin:0 auto;padding:24px}
.mgmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.mgmt-header h2{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--teal)}
.mgmt-stats{font-size:.82rem;color:var(--muted)}

.cat-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.cat-tab{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .2s}
.cat-tab:hover{border-color:var(--teal);color:var(--teal)}
.cat-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.cat-tab .cat-count{background:rgba(0,0,0,.1);border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:4px}
.cat-tab.active .cat-count{background:rgba(255,255,255,.3)}

.drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

.drug-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;position:relative}
.drug-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.drug-item.has-photo{border-color:var(--teal-md)}
.drug-item .di-photo{width:100%;height:120px;background:#f5f7f8;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;cursor:pointer;position:relative;border:2px dashed var(--border)}
.drug-item.has-photo .di-photo{border:1px solid var(--teal-md);background:var(--teal-lt)}
.drug-item .di-photo img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.drug-item .di-photo .photo-placeholder{color:var(--muted);font-size:.78rem;text-align:center;line-height:1.5}
.drug-item .di-photo input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.drug-item .di-photo .delete-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.drug-item.has-photo .di-photo .delete-photo{display:flex}
.drug-item .di-name{font-weight:700;font-size:.9rem;color:var(--ink)}
.drug-item .di-eng{font-size:.76rem;color:var(--teal);margin-top:2px}
.drug-item .di-generic{font-size:.72rem;color:var(--muted);margin-top:2px}
.drug-item .di-code{position:absolute;top:14px;right:14px;background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:.68rem;color:var(--muted);font-weight:600}
.drug-item .di-actions{display:flex;gap:6px;margin-top:8px}
.drug-item .di-actions button{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.7rem;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .2s}
.drug-item .di-actions button:hover{border-color:var(--warn);color:var(--warn)}
.drug-item.custom-drug{border-left:3px solid var(--purple)}

/* ADD DRUG FORM */
.add-drug-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.add-drug-btn:hover{background:#0a6060}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--teal);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.modal-field input,.modal-field select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:.85rem;font-family:inherit;color:var(--ink);transition:border-color .2s}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--teal)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.modal-actions button{border:none;border-radius:8px;padding:9px 20px;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.btn-cancel{background:#f0f0f0;color:var(--muted)}
.btn-cancel:hover{background:#e0e0e0}
.btn-save{background:var(--teal);color:#fff}
.btn-save:hover{background:#0a6060}

/* PRINT */
@media print{
  .header,.sidebar,.edu-top .btn-print,.key-bar,.nav-tabs{display:none!important}
  .layout{display:block}
  .main{padding:0}
  .drug-card{break-inside:avoid;page-break-inside:avoid;box-shadow:none!important;border:1px solid #bbb!important;margin-bottom:20px}
  .sched-table-wrap{box-shadow:none!important;border:1px solid #bbb!important;margin-bottom:20px;break-inside:avoid}
  body{background:#fff}
}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💊</div>
  <div>
    <h1>藥物衛教系統</h1>
    <p>上傳診所處方截圖 → AI 自動辨識 → 生成病患衛教單</p>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchPage('edu')">衛教生成</div>
  <div class="nav-tab" onclick="switchPage('mgmt')">藥物管理</div>
</div>

<!-- ===== 衛教生成頁 ===== -->
<div class="page active" id="pageEdu">
  <div class="key-bar" id="keyBar">
    <span>Claude API Key：</span>
    <input type="password" id="keyInput" placeholder="sk-ant-... （輸入後會儲存在瀏覽器）">
    <button onclick="saveKey()">儲存</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div>
        <div class="label-sm">上傳處方截圖</div>
        <div class="upload-area" id="uploadArea">
          <input type="file" accept="image/*" id="fileInput">
          <div class="upload-icon">📋</div>
          <div class="upload-text">
            <strong>點擊選擇 或 拖曳圖片</strong>
            診所系統截圖、PNG / JPG
          </div>
        </div>
        <img id="preview" alt="預覽">
      </div>
      <div>
        <div class="label-sm">補充說明（選填）</div>
        <textarea class="extra-input" id="extraInput" placeholder="例：早晚各一、飯後服用、特殊交代…"></textarea>
      </div>
      <button class="btn-analyse" id="analyseBtn" disabled onclick="analyse()">
        <div class="spinner"></div>
        <span class="btn-text">辨識並生成衛教單</span>
      </button>
      <button class="btn-analyse" style="background:#6a1b9a;box-shadow:0 2px 8px rgba(106,27,154,.3)" onclick="runDemo()">
        <span class="btn-text">展示模式（免 API Key）</span>
      </button>
      <div id="chipSection" style="display:none">
        <div class="label-sm">辨識到的藥物</div>
        <div class="chip-list" id="chipList"></div>
      </div>
    </div>

    <div class="main" id="mainPanel">
      <div class="empty-state" id="emptyState">
        <div class="ei">💊</div>
        <p>請上傳診所系統截圖<br>AI 將自動辨識所有藥物<br>並生成可列印的衛教單</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== 藥物管理頁 ===== -->
<div class="page" id="pageMgmt">
  <div class="mgmt-container">
    <div class="mgmt-header">
      <div>
        <h2>藥物管理</h2>
        <div class="mgmt-stats" id="mgmtStats"></div>
      </div>
      <button class="add-drug-btn" onclick="openAddDrug()">+ 新增藥物</button>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="drug-grid" id="drugGrid"></div>
  </div>
</div>

<!-- 新增/編輯藥物 Modal -->
<div class="modal-overlay" id="drugModal">
  <div class="modal">
    <h3 id="modalTitle">新增藥物</h3>
    <input type="hidden" id="editCode">
    <div class="modal-row">
      <div class="modal-field">
        <label>慣用名 *</label>
        <input id="fAlias" placeholder="例：Stilnox">
      </div>
      <div class="modal-field">
        <label>代碼 *</label>
        <input id="fCode" placeholder="例：STI00">
      </div>
    </div>
    <div class="modal-field">
      <label>英文商品名</label>
      <input id="fEng" placeholder="例：Stilnox 10mg">
    </div>
    <div class="modal-field">
      <label>中文商品名</label>
      <input id="fChn" placeholder="例：使蒂諾斯錠">
    </div>
    <div class="modal-field">
      <label>學名</label>
      <input id="fGeneric" placeholder="例：Zolpidem">
    </div>
    <div class="modal-field">
      <label>分類</label>
      <select id="fCat">
        <option>精神科用藥</option>
        <option>專注力藥物</option>
        <option>安眠鎮定藥</option>
        <option>輔助藥品</option>
        <option>自費品項</option>
        <option>藥水</option>
        <option>其他</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveDrug()">儲存</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// 診所藥物資料庫（73 筆）
// ══════════════════════════════════════════════════════════════════
const DRUG_DB = [
  // ── 精神科用藥 ──
  {cat:"精神科用藥",alias:"百事隴",code:"BUR00",eng:"Busron 10mg",chn:"百事隴錠",generic:"Buspirone"},
  {cat:"精神科用藥",alias:"思樂康",code:"QUI00",eng:"Quiapine 25mg",chn:"快安平錠",generic:"Quetiapine"},
  {cat:"精神科用藥",alias:"煩多悶",code:"VAL00",eng:"Valdoxan 25mg",chn:"煩多悶錠",generic:"Agomelatine"},

// IndexedDB 管理藥物照片
// ══════════════════════════════════════════════════════════════════
const DB_NAME = 'MedEduPhotos';
const DB_VER = 1;
let idb = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (idb) return resolve(idb);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore('photos', {keyPath:'code'});
    };
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror = e => reject(e.target.error);
  });
}

async function savePhoto(code, dataURL) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').put({code, dataURL});
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getPhoto(code) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').get(code);
    req.onsuccess = () => resolve(req.result?.dataURL || null);
    req.onerror = e => reject(e.target.error);
  });
}

async function deletePhoto(code) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').delete(code);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getAllPhotos() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').getAll();
    req.onsuccess = () => {
      const map = {};
      (req.result||[]).forEach(r => map[r.code] = r.dataURL);
      resolve(map);
    };
    req.onerror = e => reject(e.target.error);
  });
}

async function renderMgmt() {
  const drugs = getAllDrugs();

  const photoCount = Object.keys(photos).length;
  const customCount = getCustomDrugs().length;
  document.getElementById('mgmtStats').textContent =

  const tabsEl = document.getElementById('catTabs');

    const cnt = c === '全部' ? drugs.length : drugs.filter(d=>d.cat===c).length;
    return `<div class="cat-tab${c===currentCat?' active':''}" onclick="filterCat('${c}')">
      ${c}<span class="cat-count">${cnt}</span></div>`;
  }).join('');

  const grid = document.getElementById('drugGrid');
  const filtered = currentCat === '全部' ? drugs : drugs.filter(d=>d.cat===currentCat);
  const customCodes = new Set(getCustomDrugs().map(d=>d.code));
  grid.innerHTML = filtered.map(d => {
    const photo = photos[d.code];
    const isCustom = customCodes.has(d.code);
    return `<div class="drug-item${photo?' has-photo':''}${isCustom?' custom-drug':''}">
      <span class="di-code">${d.code}</span>
      <div class="di-photo">
        ${photo ? `<img src="${photo}" alt="${d.alias}">` : `<div class="photo-placeholder">點擊上傳照片</div>`}
        <input type="file" accept="image/*" onchange="uploadDrugPhoto('${d.code}',this)">
        <button class="delete-photo" onclick="removeDrugPhoto(event,'${d.code}')" title="刪除照片">✕</button>
      </div>
      <div class="di-name">${d.alias}</div>
      <div class="di-eng">${d.eng}</div>
      <div class="di-generic">${d.generic}</div>
      ${isCustom ? `<div class="di-actions">
        <button onclick="openEditDrug('${d.code}')">編輯</button>
        <button onclick="deleteDrug('${d.code}')">刪除</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function filterCat(cat) {
  currentCat = cat;
  renderMgmt();
}

async function uploadDrugPhoto(code, input) {
  const file = input.files[0];
  if (!file?.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    // resize to max 300px for storage efficiency
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const max = 300;
      let w = img.width, h = img.height;
      if (w > h) { h = h * max / w; w = max; }
      else { w = w * max / h; h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataURL = canvas.toDataURL('image/jpeg', 0.85);
      await savePhoto(code, dataURL);
      renderMgmt();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function removeDrugPhoto(e, code) {
  e.stopPropagation();
  e.preventDefault();
  await deletePhoto(code);
  renderMgmt();
}

// Claude API
// ══════════════════════════════════════════════════════════════════
async function callClaude(messages) {
  const key = getKey();
  if (!key) throw new Error('請先設定 Claude API Key');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 4096,
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content?.[0]?.text || '{}';
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  return jsonMatch ? jsonMatch[0] : '{}';
}

// 藥物比對：AI 辨識結果 → 本地資料庫
// ══════════════════════════════════════════════════════════════════
function matchDrug(d) {
  const searchTerms = [
    d.brand_name, d.chinese_name, d.generic_name, d.code
  ].filter(Boolean).map(s => s.toLowerCase().trim());

  let best = null, bestScore = 0;
  for (const db of getAllDrugs()) {
    const targets = [db.alias, db.code, db.eng, db.chn, db.generic]
      .map(s => s.toLowerCase());
    let score = 0;
    for (const term of searchTerms) {
      for (const tgt of targets) {
        if (tgt === term) score += 10;
        else if (tgt.includes(term) || term.includes(tgt)) score += 5;
      }
    }
    if (score > bestScore) { bestScore = score; best = db; }
  }
  return bestScore >= 5 ? best : null;
}

    }]);
    const { drugs } = JSON.parse(raw1);
    if (!drugs?.length) { showError('未辨識到藥物', '請確認截圖包含處方內容'); return; }

    renderChips(drugs);
    btn.querySelector('.btn-text').textContent = '生成衛教內容中…';

    const eduPrompt = `你是一位資深精神科護理師，使用繁體中文。請為以下藥物生成衛教說明，以純JSON格式回傳。

藥物列表：
${drugs.map((d,i)=>`[${i}] ${d.brand_name||''} (${d.generic_name||''}) ${d.dose||''} ${d.frequency||''} ${d.timing||''}`).join('\n')}

格式：
{"edu":[{"index":0,"purpose":"此藥用途一句話口語化","schedule_times":["07:00 早餐後","22:00 睡前"],"warnings":["警語1","警語2","警語3"],"side_effects":["副作用1","副作用2"],"patient_note":"給病患的溫馨叮嚀1-2句"}]}

要求：
- schedule_times 根據 frequency 和 timing 推算時間點
- warnings 給出最重要的3條注意事項
- side_effects 列出最常見的3-4個
- patient_note 溫暖易懂，像護理師在跟病患說話`;

    const raw2 = await callClaude([{ role: 'user', content: eduPrompt }]);
    const { edu } = JSON.parse(raw2);
    await renderCards(drugs, edu || []);

  } catch (err) {
    showError('分析失敗', err.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = '辨識並生成衛教單';
  }
}

// 服藥時間表
// ══════════════════════════════════════════════════════════════════
const TIME_SLOTS = [
  {key:'morning',  label:'早上',   time:'07:00-08:00', keywords:['早','morning','早餐','起床','07','08','am']},
  {key:'noon',     label:'中午',   time:'12:00-13:00', keywords:['中午','午','noon','lunch','12','13']},
  {key:'evening',  label:'晚上',   time:'18:00-19:00', keywords:['晚','evening','dinner','晚餐','18','19']},
  {key:'bedtime',  label:'睡前',   time:'21:00-22:00', keywords:['睡前','bedtime','hs','22','21','night']},
  {key:'prn',      label:'需要時', time:'—',           keywords:['需要時','prn','必要','痛','不適']}
];

function classifyTiming(drug, eduItem) {
  const slots = new Set();
  const texts = [
    drug.frequency, drug.timing,
    ...(eduItem?.schedule_times || [])
  ].filter(Boolean).map(s => s.toLowerCase());
  const allText = texts.join(' ');

  // check each time slot
  for (const slot of TIME_SLOTS) {
    for (const kw of slot.keywords) {
      if (allText.includes(kw)) { slots.add(slot.key); break; }
    }
  }

  // frequency-based fallback
  if (slots.size === 0) {
    if (/bid|每日兩次|早晚/.test(allText)) { slots.add('morning'); slots.add('bedtime'); }
    else if (/tid|每日三次/.test(allText)) { slots.add('morning'); slots.add('noon'); slots.add('evening'); }
    else if (/qid|每日四次/.test(allText)) { slots.add('morning'); slots.add('noon'); slots.add('evening'); slots.add('bedtime'); }
    else if (/qd|每日一次/.test(allText)) { slots.add('morning'); }
    else { slots.add('morning'); }
  }

  return slots;
}

function renderScheduleTable(drugs, edu, photos) {
  // build schedule data
  const rows = drugs.map((d, i) => {
    const e = edu.find(x => x.index === i) || {};
    const db = matchDrug(d);
    const photo = db ? photos[db.code] : null;
    const slots = classifyTiming(d, e);
    return {
      name: db?.alias || d.brand_name || d.chinese_name || d.generic_name,
      dose: d.dose || '',
      photo, slots
    };
  });

  // group by time slot for column-based view
  // But actually, row = drug, columns = time slots is clearer
  const activeSlots = TIME_SLOTS.filter(s =>
    rows.some(r => r.slots.has(s.key))
  );

  let html = `<div class="sched-table-wrap">
    <div class="sched-table-title">每日服藥時間表</div>
    <table class="sched-table">
      <thead><tr>
        <th style="text-align:left;padding-left:16px">藥物</th>
        ${activeSlots.map(s => `<th class="time-col">${s.label}<br><span style="font-weight:400;font-size:.65rem;opacity:.7">${s.time}</span></th>`).join('')}
      </tr></thead>
      <tbody>`;

  rows.forEach(r => {
    html += `<tr>
      <td style="text-align:left;padding-left:16px">
        <div style="display:flex;align-items:center;gap:8px">
          ${r.photo
            ? `<img src="${r.photo}" style="width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border)">`
            : `<div style="width:36px;height:36px;border-radius:6px;background:var(--teal-lt);display:flex;align-items:center;justify-content:center;font-size:1rem">💊</div>`}
          <div>
            <div class="sched-drug-name">${r.name}</div>
            <div class="sched-drug-dose">${r.dose}</div>
          </div>
        </div>
      </td>
      ${activeSlots.map(s => `<td>${r.slots.has(s.key)
        ? (r.photo
          ? `<div class="sched-cell"><img class="sched-cell-img" src="${r.photo}"><span class="sched-drug-dose">${r.dose}</span></div>`
          : `<div class="sched-cell"><div class="sched-cell-pill">💊</div><span class="sched-drug-dose">${r.dose}</span></div>`)
        : '<span class="sched-empty">—</span>'
      }</td>`).join('')}
    </tr>`;
  });

  html += `</tbody></table>
    <div class="sched-note">* 實際服藥時間請依醫師指示為準。需要時使用的藥物不需每日固定服用。</div>
  </div>`;

  return html;
}

async function renderCards(drugs, edu) {
  const panel = document.getElementById('mainPanel');
  const photos = await getAllPhotos();
  const now = new Date();
  const date = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

  panel.insertAdjacentHTML('beforeend', `
    <div class="edu-top">
      <div>
        <h2>藥物衛教單</h2>
        <div class="date">開立日期：${date}</div>
      </div>
      <button class="btn-print" onclick="window.print()">列印衛教單</button>
    </div>`);

  // 服藥時間表
  panel.insertAdjacentHTML('beforeend', renderScheduleTable(drugs, edu, photos));

  drugs.forEach((d, i) => {
    const e = edu.find(x => x.index === i) || {};
    const db = matchDrug(d);
    const photo = db ? photos[db.code] : null;
    const pillHTML = photo
      ? `<img src="${photo}" alt="${db?.alias||''}">`
      : '💊';
    const schedHTML = (e.schedule_times || [d.timing || d.frequency || '依醫囑'])
      .map(t => `<span class="sched-pill">${t}</span>`).join('');
    const warnHTML = (e.warnings || ['請依醫師指示服藥','勿自行停藥','如有不適請回診'])
      .map(w => `<li>${w}</li>`).join('');
    const sideHTML = (e.side_effects || []).map(s => `<span class="side-tag">${s}</span>`).join('');
    const displayName = db ? `${db.alias} (${db.chn})` : (d.brand_name||d.chinese_name||'');

    panel.insertAdjacentHTML('beforeend', `
      <div class="drug-card" id="card-${i}">
        <div class="card-head">
          <div class="pill-icon">${pillHTML}</div>
          <div class="card-head-info">
            <h3>${displayName} ${d.dose||''}</h3>
            <div class="sub">${d.generic_name||''} | ${db?.eng||d.brand_name||''}</div>
            <div class="badges">
              ${d.frequency ? `<span class="badge">${d.frequency}</span>` : ''}
              ${d.days ? `<span class="badge">${d.days}天份</span>` : ''}
              ${d.timing ? `<span class="badge">${d.timing}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="two-col">
            <div class="info-tile">
              <div class="tile-label">用途說明</div>
              <div class="tile-val">${e.purpose || '依醫師說明'}</div>
            </div>
            <div class="info-tile">
              <div class="tile-label">服藥方式</div>
              <div class="tile-val">${d.frequency||''}${d.timing ? ' · '+d.timing : ''}${d.days ? ' · 共'+d.days+'天' : ''}</div>
            </div>
          </div>

          <div class="sched-tile">
            <div class="tile-label">建議服藥時間</div>
            <div class="sched-pills">${schedHTML}</div>
          </div>

          ${sideHTML ? `
          <div class="side-tile">
            <div class="tile-label">可能副作用</div>
            <div class="side-tags">${sideHTML}</div>
          </div>` : ''}

          <div class="warn-tile">
            <div class="tile-label">注意事項</div>
            <ul>${warnHTML}</ul>
          </div>

          <div class="note-tile">
            <div class="tile-label">給您的叮嚀</div>
            <p>${e.patient_note || '請按時服藥，不要自行調整劑量。如有任何不適，請立即回診告知醫師。'}</p>
          </div>
        </div>
      </div>`);
  });
}

function openAddDrug() {
  document.getElementById('modalTitle').textContent = '新增藥物';
  document.getElementById('editCode').value = '';
  document.getElementById('fAlias').value = '';
  document.getElementById('fCode').value = '';
  document.getElementById('fEng').value = '';
  document.getElementById('fChn').value = '';
  document.getElementById('fGeneric').value = '';
  document.getElementById('fCat').value = '精神科用藥';
  document.getElementById('drugModal').classList.add('show');
}

function openEditDrug(code) {
  const drug = getCustomDrugs().find(d => d.code === code);
  if (!drug) return;
  document.getElementById('modalTitle').textContent = '編輯藥物';
  document.getElementById('editCode').value = code;
  document.getElementById('fAlias').value = drug.alias;
  document.getElementById('fCode').value = drug.code;
  document.getElementById('fEng').value = drug.eng;
  document.getElementById('fChn').value = drug.chn;
  document.getElementById('fGeneric').value = drug.generic;
  document.getElementById('fCat').value = drug.cat;
  document.getElementById('drugModal').classList.add('show');
}

function closeModal() {
  document.getElementById('drugModal').classList.remove('show');
}

function saveDrug() {
  const alias = document.getElementById('fAlias').value.trim();
  const code = document.getElementById('fCode').value.trim();
  if (!alias || !code) { alert('慣用名和代碼為必填'); return; }

  const drug = {
    cat: document.getElementById('fCat').value,
    alias,
    code,
    eng: document.getElementById('fEng').value.trim() || alias,
    chn: document.getElementById('fChn').value.trim() || alias,
    generic: document.getElementById('fGeneric').value.trim() || ''
  };

  const editCode = document.getElementById('editCode').value;
  const customs = getCustomDrugs();

  // check duplicate code
  const allExisting = [...DRUG_DB, ...customs];
  const dup = allExisting.find(d => d.code === code && d.code !== editCode);
  if (dup) { alert(`代碼 "${code}" 已存在（${dup.alias}）`); return; }

  if (editCode) {
    // editing
    const idx = customs.findIndex(d => d.code === editCode);
    if (idx >= 0) customs[idx] = drug;
  } else {
    // adding
    customs.push(drug);
  }

  saveCustomDrugs(customs);
  closeModal();
  renderMgmt();
}

async function deleteDrug(code) {
  if (!confirm('確定要刪除這個藥物嗎？')) return;
  const customs = getCustomDrugs().filter(d => d.code !== code);
  saveCustomDrugs(customs);
  await deletePhoto(code);
  renderMgmt();
}

document.getElementById('drugModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function showError(title, msg) {
  document.getElementById('mainPanel').insertAdjacentHTML('beforeend',
    `<div class="err-box"><strong>${title}</strong>${msg}</div>`);
}
